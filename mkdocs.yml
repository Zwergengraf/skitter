site_name: Skitter Docs
site_description: Documentation for Skitter
repo_name: Zwergengraf/skitter
repo_url: https://github.com/Zwergengraf/skitter

theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.tabs.link
    - search.highlight
    - search.suggest
  palette:
    scheme: slate
    primary: black
    accent: teal
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
nav:
  - Home: index.md
  - Getting Started:
      - Overview: getting-started/overview.md
      - Manual Setup: getting-started/manual-setup.md
      - Local Development: getting-started/local-development.md
      - Docker Compose: getting-started/docker-compose.md
      - Configuration: getting-started/configuration.md
      - Auth and Pairing: getting-started/auth-and-pairing.md
  - Architecture:
      - System Overview: architecture/system-overview.md
      - Execution Flow: architecture/execution-flow.md
      - Data Model: architecture/data-model.md
  - Components:
      - API Server: components/api-server.md
      - Admin Web UI: components/admin-web.md
      - Discord Transport: components/discord-transport.md
      - TUI Client: components/tui-client.md
      - Menubar Client: components/menubar-client.md
      - Executor Node: components/executor-node.md
      - Sandbox Runner: components/sandbox-runner.md
  - Core Concepts:
      - Profiles and Transports: core-concepts/profiles-and-transports.md
      - Sessions: core-concepts/sessions.md
      - Tools and Approvals: core-concepts/tools-and-approvals.md
      - Jobs and Sub-Agents: core-concepts/jobs-and-sub-agents.md
      - Scheduler and Heartbeats: core-concepts/scheduler-and-heartbeats.md
      - Memory: core-concepts/memory.md
      - Plugins and Hooks: core-concepts/plugins-and-hooks.md
      - Skills: core-concepts/skills.md
      - Secrets: core-concepts/secrets.md
      - Models and Reasoning: core-concepts/models-and-reasoning.md
  - Patterns:
      - Overview: patterns/overview.md
      - Event Inbox + Heartbeats: patterns/event-inbox-heartbeats.md
  - API:
      - Overview: api/overview.md
      - Profiles and Transport Accounts: api/profiles-and-transport-accounts.md
      - Commands: api/commands.md
      - Executors: api/executors.md
      - Sessions and Messages: api/sessions-and-messages.md
      - Tools and Runs: api/tools-and-runs.md
  - Operations:
      - Deployment: operations/deployment.md
      - Security: operations/security.md
      - Observability: operations/observability.md
      - Troubleshooting: operations/troubleshooting.md
      - Testing: operations/testing.md
      - Backup and Restore: operations/backup-and-restore.md
  - Contributing: contributing.md
  - Roadmap: roadmap.md
