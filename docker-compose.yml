services:
  postgres:
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${SKITTER_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${SKITTER_POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${SKITTER_POSTGRES_DB:-skittermander}
    # For security reasons, we do not expose the Postgres port to the host machine. The API service connects to it via the Docker network.
    # DO NOT UNCOMMENT THE PORTS SECTION BELOW UNLESS YOU KNOW WHAT YOU ARE DOING AND HAVE SECURED YOUR DATABASE PROPERLY.
    # ports:
    #   - "5432:5432"
    volumes:
      - skitter_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SKITTER_POSTGRES_USER:-postgres} -d ${SKITTER_POSTGRES_DB:-skittermander}"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SKITTER_CONFIG_PATH: ${SKITTER_CONFIG_PATH:-config.yaml}
      SKITTER_API_KEY: ${SKITTER_API_KEY:-}
      SKITTER_BOOTSTRAP_CODE: ${SKITTER_BOOTSTRAP_CODE:-}
      SKITTER_SECRETS_MASTER_KEY: ${SKITTER_SECRETS_MASTER_KEY:-}
      SKITTER_ENABLE_DISCORD: ${SKITTER_ENABLE_DISCORD:-true}
      SKITTER_DB_URL: postgresql+asyncpg://${SKITTER_POSTGRES_USER:-postgres}:${SKITTER_POSTGRES_PASSWORD:-postgres}@postgres:5432/${SKITTER_POSTGRES_DB:-skittermander}
      SKITTER_WORKSPACE_ROOT: /workspace
      SKITTER_HOST_WORKSPACE_ROOT: ${SKITTER_HOST_WORKSPACE_ROOT:-}
      SKITTER_SANDBOX_IMAGE: skittermander-sandbox
      SKITTER_SANDBOX_NETWORK: ${COMPOSE_PROJECT_NAME:-skittermander}_default
      SKITTER_SANDBOX_PORT: 9080
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./workspace:/workspace
      - ./workspace-skeleton:/app/workspace-skeleton:ro
      - ./config.yaml:/app/config.yaml
      - ./system_prompt.md:/app/system_prompt.md
      - /var/run/docker.sock:/var/run/docker.sock
    command: ["sh", "-c", "python -m skittermander.data.init_db && python -m skittermander.server"]
    restart: unless-stopped

  admin-web:
    build:
      context: ./admin-web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${ADMIN_WEB_API_BASE_URL:-http://localhost:8000}
        VITE_API_KEY: ${SKITTER_API_KEY:-}
    depends_on:
      - api
    ports:
      - "5173:80"
    restart: unless-stopped

  sandbox:
    build:
      context: .
      dockerfile: skittermander/sandbox/Dockerfile
    image: skittermander-sandbox
    profiles:
      - sandbox

volumes:
  skitter_pg:
