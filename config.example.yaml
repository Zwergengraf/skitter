database:
  url: postgresql+asyncpg://postgres:postgres@localhost:5432/skittermander
prompt:
  path: system_prompt.md
  context_files:
  - AGENTS.md
  - TOOLS.md
  - IDENTITY.md
  - USER.md
context:
  max_tool_messages: 8
  max_chat_messages: 32
  compact_every_messages: 16
limits:
  max_tool_calls: 16
  max_runtime_seconds: 600
  max_cost_usd: 0.10
jobs:
  enabled: true
  poll_interval_seconds: 2
  max_concurrent: 2
  limits:
    max_tool_calls: 32
    max_runtime_seconds: 900
    max_cost_usd: 5.0
providers:
  - name: local
    # api_type: openai   # optional (default)
    api_base: http://localhost:1234/v1
    api_key: ""
  # - name: anthropic
  #   api_type: anthropic
  #   api_base: https://api.anthropic.com
  #   api_key: ""
models:
  - name: main
    provider: local
    model_id: local-main
    input_cost_per_1m: 0
    output_cost_per_1m: 0
    # Optional per-model override (deep-merged over global reasoning settings):
    # reasoning:
    #   openai:
    #     effort: high
    #     summary: detailed
  - name: heartbeat
    provider: local
    model_id: local-heartbeat
    input_cost_per_1m: 0
    output_cost_per_1m: 0
    # reasoning:
    #   anthropic:
    #     thinking:
    #       budget_tokens: 4096
main_model: local/main
heartbeat_model: local/heartbeat
reasoning:
  enabled: true
  openai:
    use_responses_api: true
    output_version: responses/v1
    effort: medium
    summary: auto
  anthropic:
    budget_tokens: 2048
    output_version: ""
embeddings:
  api_base: http://127.0.0.1:1234/v1
  api_key: ""
  model: text-embedding-embeddinggemma-300m
  target_chunk_chars: 700
  max_chunk_chars: 1000
  min_similarity: 0.3
brave:
  api_key: ""
  api_base: https://api.search.brave.com/res/v1/web/search
browser:
  executable: /usr/bin/brave-browser
# scheduler:
#   timezone: UTC
discord:
  token: ""
  progress_updates: true
  progress_interval_seconds: 3
users:
  approved_message: Hey! I just came online. Who am I? Who are you?
heartbeat:
  enabled: true
  interval_minutes: 15
  history_runs: 0 # No previous heartbeat messages will be included in the heartbeat prompt if this is set to 0
  prompt: "Follow these instructions from the file `HEARTBEAT.md` strictly. Do not infer or repeat old tasks from prior chats. If nothing needs attention, reply with: HEARTBEAT_OK"
  quiet_hours_start: "23:00"
  quiet_hours_end: "08:00"
workspace:
  root: workspace
  skeleton_root: workspace-skeleton
  host_root: ''
  skills_root: skills
sandbox:
  base_url: http://localhost:9080
  api_key: ''
  image: skittermander-sandbox
  network: ''
  port: 9080
  idle_seconds: 900
  idle_check_seconds: 60
  container_prefix: skitter-sandbox
  connect_retries: 5
  connect_backoff: 0.5
cors:
  origins:
  - http://localhost:5173
tools:
  approval_required: false
  approval_tools:
  - write
  - edit
  - delete
  - download
  - browser
  - sub_agent
  - sub_agent_batch
  - job_start
  - shell
  - create_secret
sub_agents:
  max_concurrent: 4
  timeout_seconds: 180
  max_tasks_per_batch: 8
  transcript_chars: 12000
