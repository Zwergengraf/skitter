database:
  url: postgresql+asyncpg://postgres:postgres@postgres:5432/skitter
logging:
  level: INFO
  admin_event_buffer_size: 1000
prompt:
  path: system_prompt.md
  context_files:
  - IDENTITY.md
  - USER.md
  - SOUL.md
  - AGENTS.md
  - TOOLS.md
context:
  max_tool_messages: 32
  max_chat_messages: 32
  compact_every_messages: 16
limits:
  max_tool_calls: 32
  max_runtime_seconds: 600
  max_cost_usd: 0.50
jobs:
  enabled: true
  poll_interval_seconds: 2
  max_concurrent: 2
  limits:
    max_tool_calls: 128
    max_runtime_seconds: 1800
    max_cost_usd: 2.0
providers:
  - name: openai
    # api_type: openai   # optional (default)
    api_base: https://api.openai.com/v1
    api_key: ""
  # - name: local
  #   api_base: http://localhost:1234/v1
  #   api_key: ""
  # - name: anthropic
  #   api_type: anthropic
  #   api_base: https://api.anthropic.com
  #   api_key: ""
models:
  - name: gpt-5.4
    provider: openai
    model_id: gpt-5.4-2026-03-05
    input_cost_per_1m: 2.5
    output_cost_per_1m: 15.0
    # Optional per-model override (deep-merged over global reasoning settings):
    # reasoning:
    #   openai:
    #     effort: high
    #     summary: detailed
  - name: gpt-5.4-mini
    provider: openai
    model_id: gpt-5.4-mini-2026-03-17
    input_cost_per_1m: 0.75
    output_cost_per_1m: 4.5
    # reasoning:
    #   anthropic:
    #     thinking:
    #       budget_tokens: 4096
main_model:
  - openai/gpt-5.4
heartbeat_model:
  - openai/gpt-5.4-mini
reasoning:
  enabled: true
  openai:
    use_responses_api: true
    output_version: responses/v1
    effort: medium
    summary: auto
  anthropic:
    budget_tokens: 2048
    output_version: ""
embeddings:
  api_base: https://api.openai.com/v1
  api_key: ""
  model: text-embedding-3-small
  target_chunk_chars: 700
  max_chunk_chars: 1000
  max_distance: 0.45
web_search:
  engine: brave # Options: searxng, brave
  searxng:
    api_base: http://searxng:8080/search
  brave:
    api_key: ""
    api_base: https://api.search.brave.com/res/v1/web/search
mcp:
  servers:
    # Example stdio MCP server (disabled by default).
    # - name: filesystem
    #   description: Read and write files inside the workspace.
    #   enabled: false
    #   transport: stdio
    #   command: npx
    #   args: ["-y", "@modelcontextprotocol/server-filesystem", "/workspace"]
    #   env: {}
    #   cwd: ""
    #   startup_timeout_seconds: 15
    #   request_timeout_seconds: 120
    # Example network MCP server over HTTP (disabled by default).
    # - name: remote-mcp
    #   description: Access a remote service that exposes MCP tools over HTTP.
    #   enabled: false
    #   transport: http
    #   url: http://127.0.0.1:3000/mcp
    #   headers: {}
    #   startup_timeout_seconds: 15
    #   request_timeout_seconds: 120
    - name: example
      description: ""
      enabled: false
      transport: stdio
      command: ""
      args: []
      url: ""
      headers: {}
      env: {}
      cwd: ""
      startup_timeout_seconds: 15
      request_timeout_seconds: 120
browser:
  executable: /usr/bin/brave-browser
# scheduler:
#   timezone: UTC
discord:
  enabled: true
  token: ""
  progress_updates: true
  progress_interval_seconds: 3
users:
  approved_message: Hey! I just came online. Who am I? Who are you?
heartbeat:
  enabled: true
  interval_minutes: 15
  history_runs: 0 # No previous heartbeat messages will be included in the heartbeat prompt if this is set to 0
  prompt: "Follow these instructions from the file `HEARTBEAT.md` strictly. Do not infer or repeat old tasks from prior chats. If nothing needs attention, reply with: HEARTBEAT_OK"
  quiet_hours_start: "23:00"
  quiet_hours_end: "08:00"
workspace:
  root: workspace
  skeleton_root: workspace-skeleton
  host_root: ''
  skills_root: skills
sandbox:
  base_url: http://localhost:9080
  api_key: ''
  image: skitter-sandbox
  network: ''
  port: 9080
  idle_seconds: 900
  idle_check_seconds: 60
  container_prefix: skitter-sandbox
  connect_retries: 5
  connect_backoff: 0.5
executors:
  # Automatically create Docker sandbox containers (one per user) instead of having to manually set up an executor.
  auto_docker_default: true
cors:
  origins:
  - http://localhost:5173
tools:
  approval_required: false
  approval_tools:
  - write
  - edit
  - apply_patch
  - delete
  - download
  - transfer_file
  - attach_file
  - browser
  - notify
  - screenshot
  - mouse_move
  - mouse_click
  - keyboard_type
  - keyboard_press
  - sub_agent
  - sub_agent_batch
  - job_start
  - shell
  - create_secret
  - mcp_call
  # Default keeps forced approvals for shell calls that use secret_refs.
  # Set this EXACT value to disable the forced secrets-approval override (very unsafe):
  # i_have_read_the_warnings_and_im_probably_doing_something_cursed
  approval_secrets_required: always
sub_agents:
  max_concurrent: 4
  timeout_seconds: 180
  max_tasks_per_batch: 8
  transcript_chars: 12000
